name: Build Book Importer EXE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    name: Build Windows EXE installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Book Importer EXE
        run: .\gradlew.bat packageBookImporterWindowsExe --no-daemon --stacktrace

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seforim-book-importer-exe
          path: |
            generator/bookimporter/build/compose/binaries/main-release/exe/*.exe
            generator/bookimporter/build/compose/binaries/main-release/exe/**/*.exe
          if-no-files-found: error
          retention-days: 14
