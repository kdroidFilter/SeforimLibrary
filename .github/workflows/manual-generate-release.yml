name: Manual Generate + Pre-Release

# End-to-end build pipeline: builds seforim.db from the latest Sefaria +
# Otzaria sources, packages a split bundle, and publishes the lot as a
# GitHub pre-release.
#
# From the second release onwards, the workflow produces a logarithmic
# fan of delta patches against previous pre-releases at fixed offsets
# {1, 2, 4, 8, 16}. A client on any version k within those offsets can
# fetch a *direct* patch; clients further back chain through the
# available anchors. The full bundle remains the fallback.
#
# Anchors auto-discovered from prior pre-release assets — no manual
# operator input needed. db_version is derived as max(prior versions)+1.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build seforim.db + bundle + delta fan, publish pre-release
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Logarithmic anchor offsets — covers ~16 versions back with 5 patches.
      # Older clients chain through the anchors; the full bundle is the
      # ultimate fallback.
      PATCH_OFFSETS: "1 2 4 8 16"

    steps:
      - name: Checkout SeforimLibrary
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Bridle daemon heaps + generator forks for the 16 GB runner
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx3g
          kotlin.compiler.execution.strategy=in-process
          generatorHeap=8g
          EOF

      - name: Install JBR 25
        run: |
          curl -L -o jbr.tar.gz "https://cache-redirector.jetbrains.com/intellij-jbr/jbrsdk-25.0.1-linux-x64-b268.52.tar.gz"
          mkdir -p "$RUNNER_TEMP/jbr"
          tar -xzf jbr.tar.gz -C "$RUNNER_TEMP/jbr"
          JBR_DIR=$(find "$RUNNER_TEMP/jbr" -mindepth 1 -maxdepth 1 -type d -name "jbr*" -o -name "jbrsdk*" | head -n 1)
          echo "JAVA_HOME=$JBR_DIR" >> "$GITHUB_ENV"
          echo "$JBR_DIR/bin" >> "$GITHUB_PATH"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install zstd + sqlite + jq
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zstd sqlite3 jq

      - name: Compute release tag
        id: release_meta
        run: |
          TAG=$(date -u +"%Y%m%d%H%M%S")
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      # ─── Discover prior pre-releases + decide db_version + seed ────────────
      # We treat the existence of a `seforim.db.v<N>` asset on a pre-release as
      # the authoritative signal for that release's db_version. Tags are just
      # human-readable timestamps.
      - name: Auto-discover prior pre-releases
        id: discover
        run: |
          set -euo pipefail
          # List every release (pre and final), filter to pre-releases that
          # carry a seforim.db.v<N> asset, output a NDJSON map.
          gh release list --limit 100 --json tagName,isPrerelease,createdAt,name \
            > all-releases.json
          : > prior-versions.tsv  # cols: db_version<TAB>release_tag
          while IFS= read -r tag; do
            ASSETS=$(gh release view "$tag" --json assets --jq '.assets[].name')
            VER=$(echo "$ASSETS" | grep -oE '^seforim\.db\.v[0-9]+$' | head -n1 \
                  | sed -E 's/^seforim\.db\.v//' || true)
            if [ -n "$VER" ]; then
              echo -e "${VER}\t${tag}" >> prior-versions.tsv
            fi
          done < <(jq -r '.[] | select(.isPrerelease == true) | .tagName' all-releases.json)
          # Sort by version DESC so head -n1 is the most recent.
          sort -k1,1nr -o prior-versions.tsv prior-versions.tsv
          echo "Prior pre-releases (db_version → tag):"
          cat prior-versions.tsv || true

          if [ ! -s prior-versions.tsv ]; then
            echo "No prior pre-release found — this is the first release."
            echo "db_version=1" >> "$GITHUB_OUTPUT"
            echo "has_prev=false" >> "$GITHUB_OUTPUT"
          else
            LAST_VER=$(head -n1 prior-versions.tsv | cut -f1)
            NEXT_VER=$((LAST_VER + 1))
            LAST_TAG=$(head -n1 prior-versions.tsv | cut -f2)
            echo "Most recent: db_version=$LAST_VER tag=$LAST_TAG → this build: db_version=$NEXT_VER"
            echo "db_version=$NEXT_VER" >> "$GITHUB_OUTPUT"
            echo "has_prev=true" >> "$GITHUB_OUTPUT"
            echo "seed_version=$LAST_VER" >> "$GITHUB_OUTPUT"
            echo "seed_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Seed allocator from offset-1 release
        if: steps.discover.outputs.has_prev == 'true'
        run: |
          set -euo pipefail
          SEED_TAG="${{ steps.discover.outputs.seed_tag }}"
          echo "Seeding allocator from release '$SEED_TAG'"
          mkdir -p build prev-dbs
          gh release download "$SEED_TAG" \
            --pattern 'seforim.db.buildstate' \
            --dir build
          # Buildstate goes where generateSeforimDb expects it.
          ls -lh build/seforim.db.buildstate

      # ─── Build seforim.db (full pipeline) ──────────────────────────────────
      - name: Generate Seforim Database
        run: |
          ./gradlew generateSeforimDb \
            -PreleaseName=${{ steps.release_meta.outputs.release_tag }} \
            -PdbVersion=${{ steps.discover.outputs.db_version }} \
            --no-daemon --stacktrace

      - name: Package Seforim Bundle (split tar.zst)
        run: ./gradlew packageSeforimBundle --no-daemon --stacktrace

      - name: List bundle parts
        run: |
          set -euo pipefail
          PARTS=(generator/packaging/build/package/seforim_bundle.tar.zst.part*)
          if [ ${#PARTS[@]} -eq 0 ] || [ "${PARTS[0]}" = "generator/packaging/build/package/seforim_bundle.tar.zst.part*" ]; then
            echo "No bundle parts produced." >&2
            exit 1
          fi
          ls -lh "${PARTS[@]}"

      # ─── Produce log-fan of patches: offsets {1, 2, 4, 8, 16} ──────────────
      # For each offset O where a release exists at (this_version - O), download
      # that release's seforim.db.v<X>, produce + verify patch. Free the prev
      # DB right after to bound disk peak.
      - name: Produce + verify patch fan
        if: steps.discover.outputs.has_prev == 'true'
        run: |
          set -euo pipefail
          THIS_VER=${{ steps.discover.outputs.db_version }}
          mkdir -p patches prev-dbs
          for OFFSET in $PATCH_OFFSETS; do
            TARGET_VER=$((THIS_VER - OFFSET))
            if [ "$TARGET_VER" -lt 1 ]; then
              echo "offset $OFFSET would target version $TARGET_VER (<1) — skip"
              continue
            fi
            # Find the tag for this version, if any.
            TAG=$(awk -F'\t' -v v="$TARGET_VER" '$1==v{print $2; exit}' prior-versions.tsv || true)
            if [ -z "$TAG" ]; then
              echo "No prior release at db_version=$TARGET_VER (offset $OFFSET) — skip"
              continue
            fi
            echo "=== Producing patch v${TARGET_VER} → v${THIS_VER} (offset $OFFSET, tag=$TAG) ==="
            rm -f prev-dbs/seforim.db.v*
            gh release download "$TAG" \
              --pattern "seforim.db.v${TARGET_VER}" \
              --dir prev-dbs
            PREV_DB="prev-dbs/seforim.db.v${TARGET_VER}"
            test -s "$PREV_DB" || { echo "::error::Missing $PREV_DB"; exit 1; }

            ./gradlew :generator-common:producePatchAndVerify \
              -PprevDb=$PWD/$PREV_DB \
              -PnewDb=$PWD/build/seforim.db \
              -Pout=$PWD/patches/patch-v${TARGET_VER}-v${THIS_VER}.db \
              -PcatalogPb=$PWD/build/catalog.pb \
              -PfromVersion=$TARGET_VER -PtoVersion=$THIS_VER \
              --no-daemon --stacktrace

            # Free disk for the next iteration — only the .zst + manifest
            # need to ship; the .db was the verify ground-truth.
            rm -f "$PREV_DB" \
                  "patches/patch-v${TARGET_VER}-v${THIS_VER}.db" \
                  "patches/verify-patch-v${TARGET_VER}-v${THIS_VER}.db"
            df -h /
          done
          echo "=== Final patch artefacts ==="
          ls -lh patches/ || true

      # ─── Stage release assets ──────────────────────────────────────────────
      - name: Stage release assets
        run: |
          set -euo pipefail
          STAGE=release-staging
          mkdir -p "$STAGE"
          cp generator/packaging/build/package/seforim_bundle.tar.zst.part* "$STAGE/"
          cp build/seforim.db.buildstate "$STAGE/"
          cp build/catalog.pb "$STAGE/"
          # Full DB under its version (next release's seed source).
          cp build/seforim.db "$STAGE/seforim.db.v${{ steps.discover.outputs.db_version }}"
          # Patch fan (zero or more files; only present from release #2 on).
          if compgen -G "patches/patch-*.db.zst" > /dev/null; then
            cp patches/patch-*.db.zst "$STAGE/"
            cp patches/patch-*.db.zst.manifest.json "$STAGE/"
          fi
          echo "Staged assets:"
          ls -lh "$STAGE/"

      - name: Create GitHub pre-release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: ${{ steps.release_meta.outputs.release_tag }}
          draft: false
          prerelease: true
          files: release-staging/*

      - name: Trigger release manifest update
        run: |
          sleep 10
          gh workflow run update-release-manifest.yml
