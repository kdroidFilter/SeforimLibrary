name: Manual Generate + Pre-Release

# End-to-end build pipeline: builds seforim.db from the latest Sefaria +
# Otzaria sources, packages a split bundle, produces a delta against the
# previous published release (if any), and publishes the lot as a GitHub
# pre-release.
#
# - Pre-release flag: lets us iterate on the data pipeline without
#   pushing a "latest" tag to clients that watch /releases/latest.
# - Heap budget: same as the delta-* workflows so the runner doesn't
#   OOM (Gradle 3g + Kotlin in-process + generatorHeap=8g).
# - Delta: skipped on the very first run (no prior buildstate to seed
#   the IdAllocator from); from the second run onwards the workflow
#   downloads the previous pre-release's seforim.db.buildstate, seeds
#   the allocator, then produces a patch-v<prev>-v<this>.db.zst.

on:
  workflow_dispatch:
    inputs:
      previous_release_tag:
        description: |
          Tag of the previous pre-release to diff against (e.g. 20260513210000).
          Leave blank to skip delta production (use for the very first release).
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build seforim.db + bundle + delta, publish pre-release
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout SeforimLibrary
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Bridle daemon heaps + generator forks for the 16 GB runner
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx3g
          kotlin.compiler.execution.strategy=in-process
          generatorHeap=8g
          EOF

      - name: Install JBR 25
        run: |
          curl -L -o jbr.tar.gz "https://cache-redirector.jetbrains.com/intellij-jbr/jbrsdk-25.0.1-linux-x64-b268.52.tar.gz"
          mkdir -p "$RUNNER_TEMP/jbr"
          tar -xzf jbr.tar.gz -C "$RUNNER_TEMP/jbr"
          JBR_DIR=$(find "$RUNNER_TEMP/jbr" -mindepth 1 -maxdepth 1 -type d -name "jbr*" -o -name "jbrsdk*" | head -n 1)
          echo "JAVA_HOME=$JBR_DIR" >> "$GITHUB_ENV"
          echo "$JBR_DIR/bin" >> "$GITHUB_PATH"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install zstd + sqlite
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zstd sqlite3

      - name: Compute release tag
        id: release_meta
        shell: bash
        run: |
          TAG=$(date -u +"%Y%m%d%H%M%S")
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      # ─── Seed allocator + determine db_version from prev release ───────────
      # db_version is a monotonic Int stored in schema_meta — distinct from
      # the timestamp release tag. When seeding from a prior release we
      # read its db_version + 1; otherwise we start at 1.
      - name: Resolve db_version + seed allocator
        id: dbver
        run: |
          set -euo pipefail
          PREV="${{ inputs.previous_release_tag }}"
          if [ -z "$PREV" ]; then
            echo "First release — db_version=1, no seed/diff."
            echo "db_version=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Resolving db_version from previous release '$PREV'"
          mkdir -p build/prev-release
          gh release download "$PREV" \
            --pattern 'seforim.db.buildstate' \
            --pattern 'seforim.db.v*' \
            --dir build/prev-release
          PREV_DB=$(ls build/prev-release/seforim.db.v* 2>/dev/null | head -n1 || true)
          if [ -z "$PREV_DB" ]; then
            echo "::error::Previous release '$PREV' has no seforim.db.v* asset"
            exit 1
          fi
          PREV_VER=$(sqlite3 "$PREV_DB" "SELECT value FROM schema_meta WHERE key='db_version'")
          if ! [[ "$PREV_VER" =~ ^[0-9]+$ ]]; then
            echo "::error::Previous db_version='$PREV_VER' is not an integer"
            exit 1
          fi
          NEXT_VER=$((PREV_VER + 1))
          echo "Previous db_version=$PREV_VER → this build's db_version=$NEXT_VER"
          echo "db_version=$NEXT_VER" >> "$GITHUB_OUTPUT"
          # Seed buildstate so the IdAllocator stays stable across builds.
          mkdir -p build
          cp build/prev-release/seforim.db.buildstate build/seforim.db.buildstate
          cp "$PREV_DB" build/seforim.db.prev
          {
            echo "PREV_DB_PATH=$PWD/build/seforim.db.prev"
            echo "PREV_DB_VERSION=$PREV_VER"
          } >> "$GITHUB_ENV"

      # ─── Build seforim.db (full pipeline) ──────────────────────────────────
      - name: Generate Seforim Database
        run: |
          ./gradlew generateSeforimDb \
            -PreleaseName=${{ steps.release_meta.outputs.release_tag }} \
            -PdbVersion=${{ steps.dbver.outputs.db_version }} \
            --no-daemon --stacktrace

      - name: Package Seforim Bundle (split tar.zst)
        run: ./gradlew packageSeforimBundle --no-daemon --stacktrace

      - name: List bundle parts
        run: |
          set -euo pipefail
          PARTS=(generator/packaging/build/package/seforim_bundle.tar.zst.part*)
          if [ ${#PARTS[@]} -eq 0 ] || [ "${PARTS[0]}" = "generator/packaging/build/package/seforim_bundle.tar.zst.part*" ]; then
            echo "No bundle parts produced." >&2
            exit 1
          fi
          ls -lh "${PARTS[@]}"

      # ─── Produce + verify delta patch (only when seeded) ───────────────────
      - name: Produce + verify patch (prev → this)
        if: ${{ env.PREV_DB_PATH != '' }}
        run: |
          set -euo pipefail
          PREV_VER=$PREV_DB_VERSION
          THIS_VER=${{ steps.dbver.outputs.db_version }}
          ./gradlew :generator-common:producePatchAndVerify \
            -PprevDb=$PREV_DB_PATH \
            -PnewDb=$PWD/build/seforim.db \
            -Pout=$PWD/build/patch-v${PREV_VER}-v${THIS_VER}.db \
            -PcatalogPb=$PWD/build/catalog.pb \
            -PfromVersion=$PREV_VER -PtoVersion=$THIS_VER \
            --no-daemon --stacktrace
          echo "Patch artefacts:"
          ls -lh build/patch-*.db build/patch-*.db.zst build/patch-*.db.zst.manifest.json

      # ─── Stage release assets ──────────────────────────────────────────────
      - name: Stage release assets
        id: stage
        run: |
          set -euo pipefail
          STAGE=release-staging
          mkdir -p "$STAGE"
          # Bundle parts (always)
          cp generator/packaging/build/package/seforim_bundle.tar.zst.part* "$STAGE/"
          # Buildstate (for the next release to seed from)
          cp build/seforim.db.buildstate "$STAGE/"
          # Catalog.pb (clients pull this for the book index)
          cp build/catalog.pb "$STAGE/"
          # Patch + manifest (only when we built one)
          if compgen -G "build/patch-*.db.zst" > /dev/null; then
            cp build/patch-*.db.zst "$STAGE/"
            cp build/patch-*.db.zst.manifest.json "$STAGE/"
          fi
          # Rename the full DB so consumers can fetch it directly by version.
          # Suffix is the monotonic db_version (matches what's stored inside
          # the DB's schema_meta), not the release tag — the next release's
          # CI uses this to find the right asset to seed from.
          cp build/seforim.db "$STAGE/seforim.db.v${{ steps.dbver.outputs.db_version }}"
          echo "Staged assets:"
          ls -lh "$STAGE/"

      - name: Create GitHub pre-release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: ${{ steps.release_meta.outputs.release_tag }}
          draft: false
          prerelease: true
          files: release-staging/*

      - name: Trigger release manifest update
        run: |
          sleep 10
          gh workflow run update-release-manifest.yml
